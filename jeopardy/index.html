<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Francesca's Bach Jeopardy</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500&family=Dancing+Script:wght@600;700&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #fdf7f2;
    --blush:      #f2c4c4;
    --blush-soft: #fae8e8;
    --rose:       #d98fa0;
    --rose-deep:  #b86478;
    --peach:      #f5cdb4;
    --peach-soft: #faeade;
    --champagne:  #e8d4a8;
    --gold:       #c9a96e;
    --warm:       #8a6252;
    --sand:       #e8ddd0;
    --dark:       #2e1e1a;
    --text:       #3d2620;
    --text-soft:  #7a5a52;
    --white:      #fffcf9;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ── SCATTERED CUTOUT ILLUSTRATIONS ── */
  .cutout {
    position: fixed;
    pointer-events: none;
    z-index: 0;
    opacity: 0.82;
  }

  /* Each cutout's position, size, rotation */
  #ico-palm     { bottom: -10px; left: -18px;  width: 210px; transform: rotate(-6deg); opacity: 0.75; }
  #ico-palm2    { top: 30px;     right: -20px; width: 170px; transform: rotate(8deg) scaleX(-1); opacity: 0.65; }
  #ico-flute1   { top: 140px;    left: 28px;   width: 70px;  transform: rotate(-12deg); }
  #ico-flute2   { bottom: 160px; right: 38px;  width: 60px;  transform: rotate(14deg); opacity: 0.7; }
  #ico-ring     { top: 55px;     right: 200px; width: 68px;  transform: rotate(10deg); }
  #ico-ring2    { bottom: 220px; left: 110px;  width: 52px;  transform: rotate(-8deg); opacity: 0.65; }
  #ico-pj       { top: 300px;    left: 18px;   width: 90px;  transform: rotate(6deg); opacity: 0.72; }
  #ico-shell1   { bottom: 80px;  left: 180px;  width: 56px;  transform: rotate(-18deg); opacity: 0.7; }
  #ico-shell2   { top: 200px;    right: 22px;  width: 48px;  transform: rotate(20deg); opacity: 0.65; }
  #ico-wave     { bottom: 0px;   left: 0;      width: 100%;  opacity: 0.12; z-index: 0; }
  #ico-sun      { top: 18px;     left: 50%;    width: 80px;  transform: translateX(-50%) rotate(0deg); opacity: 0.55; }
  #ico-mask     { bottom: 300px; right: 22px;  width: 78px;  transform: rotate(-10deg); opacity: 0.7; }
  #ico-candle   { top: 420px;    right: 130px; width: 52px;  transform: rotate(5deg); opacity: 0.72; }
  #ico-bubbles  { top: 90px;     left: 130px;  width: 44px;  transform: rotate(-5deg); opacity: 0.6; }
  #ico-dog      { bottom: 90px;  right: 120px; width: 115px; transform: rotate(4deg) scaleX(-1); opacity: 0.82; }
  #ico-bow      { top: 160px;    right: 220px; width: 58px;  transform: rotate(-8deg); opacity: 0.68; }
  #ico-starfish { bottom: 180px; left: 260px;  width: 50px;  transform: rotate(22deg); opacity: 0.6; }
  #ico-moon     { top: 50px;     left: 220px;  width: 48px;  transform: rotate(-15deg); opacity: 0.5; }

  /* ── HERO ── */
  .hero {
    position: relative;
    z-index: 1;
    height: 320px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, #f5e6d8 0%, #faeade 40%, #fdf7f2 100%);
    overflow: visible;
  }

  .hero-text {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 2rem;
  }

  .hero-eyebrow {
    font-size: 0.6rem;
    font-weight: 400;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--rose);
    opacity: 0.85;
    margin-bottom: 1rem;
  }

  .hero-title {
    font-family: 'Dancing Script', cursive;
    font-weight: 700;
    font-size: clamp(2.8rem, 7.5vw, 5.8rem);
    color: var(--rose-deep);
    line-height: 1;
    text-shadow: 0 2px 30px rgba(184,100,120,0.18);
    margin-bottom: 0.7rem;
  }

  .hero-line {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--rose), transparent);
    margin: 0.9rem auto;
  }

  .hero-sub {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(0.85rem, 1.8vw, 1.05rem);
    color: var(--warm);
    letter-spacing: 0.06em;
    opacity: 0.85;
  }

  /* ── SCOREBOARD ── */
  .scoreboard {
    position: relative;
    z-index: 1;
    background: var(--dark);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0;
  }

  .team-panel {
    flex: 1;
    max-width: 320px;
    padding: 0.9rem 2rem 0.8rem;
    text-align: center;
  }

  .vs-sep {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1rem;
    color: rgba(232,212,168,0.35);
    padding: 0 1rem;
    flex-shrink: 0;
  }

  .team-tag {
    font-size: 0.52rem;
    font-weight: 500;
    letter-spacing: 0.44em;
    text-transform: uppercase;
    color: var(--rose);
    margin-bottom: 0.15rem;
  }

  .team-score {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 700;
    color: var(--champagne);
    line-height: 1;
    margin-bottom: 0.55rem;
  }

  .pts-wrap {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.3rem;
    margin-bottom: 0.35rem;
  }

  .pt-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.58rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    padding: 0.26rem 0.55rem;
    border-radius: 20px;
    border: 1px solid rgba(201,169,110,0.3);
    background: transparent;
    color: var(--gold);
    cursor: pointer;
    transition: all 0.18s;
  }

  .pt-btn:hover {
    background: rgba(201,169,110,0.15);
    border-color: var(--gold);
    color: var(--champagne);
    transform: translateY(-1px);
  }

  .pt-btn.sub {
    border-color: rgba(217,143,160,0.28);
    color: rgba(217,143,160,0.65);
  }

  .pt-btn.sub:hover {
    background: rgba(217,143,160,0.1);
    border-color: var(--rose);
    color: var(--rose);
  }

  .reset-txt {
    font-size: 0.48rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(201,169,110,0.22);
    cursor: pointer;
    transition: color 0.2s;
    display: inline-block;
  }

  .reset-txt:hover { color: rgba(201,169,110,0.55); }

  /* ── BOARD ── */
  .board-wrap {
    position: relative;
    z-index: 1;
    max-width: 1160px;
    margin: 0 auto;
    padding: 2rem 1.2rem 3.5rem;
  }

  .board-label {
    text-align: center;
    margin-bottom: 1.3rem;
    font-size: 0.54rem;
    letter-spacing: 0.44em;
    text-transform: uppercase;
    color: var(--text-soft);
    opacity: 0.55;
    font-weight: 400;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
  }

  .cat-head {
    border-radius: 10px;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0.85rem 0.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .cat-head:nth-child(1) { background: linear-gradient(145deg, #b8667a, #9a4a62); }
  .cat-head:nth-child(2) { background: linear-gradient(145deg, #a07060, #7a5248); }
  .cat-head:nth-child(3) { background: linear-gradient(145deg, #c98880, #a86060); }
  .cat-head:nth-child(4) { background: linear-gradient(145deg, #8a7868, #6a5c4e); }
  .cat-head:nth-child(5) { background: linear-gradient(145deg, #b0907a, #8a6860); }
  .cat-head:nth-child(6) { background: linear-gradient(145deg, #c4a07a, #9a7848); }

  .cat-head::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='4' height='4' viewBox='0 0 4 4' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 3h1v1H1V3zm2-2h1v1H3V1z' fill='%23ffffff' fill-opacity='0.07'/%3E%3C/svg%3E");
    pointer-events: none;
  }

  .cat-head-name {
    position: relative;
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(0.54rem, 1vw, 0.7rem);
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,252,249,0.93);
    line-height: 1.35;
  }

  .card {
    background: var(--white);
    border: 1px solid rgba(184,102,122,0.13);
    border-radius: 10px;
    height: 94px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.34,1.4,0.64,1);
    box-shadow: 0 2px 10px rgba(62,38,32,0.055);
    position: relative;
    overflow: hidden;
  }

  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(250,232,232,0.55) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .card:hover:not(.used) {
    transform: translateY(-4px) scale(1.025);
    border-color: var(--rose);
    box-shadow: 0 10px 28px rgba(184,100,120,0.17);
    background: var(--blush-soft);
  }

  .card:hover:not(.used)::after { opacity: 1; }

  .card-val {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.2rem, 2.3vw, 1.85rem);
    font-weight: 700;
    color: var(--rose-deep);
    position: relative;
    z-index: 1;
  }

  .card.used {
    background: rgba(232,221,208,0.28);
    border-color: rgba(200,180,165,0.13);
    box-shadow: none;
    cursor: default;
  }

  .card.used .card-val { opacity: 0.07; }

  /* ── MODAL ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(30,18,14,0.7);
    backdrop-filter: blur(14px) saturate(0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 400;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    padding: 1.5rem;
  }

  .overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--white);
    border-radius: 20px;
    width: 100%;
    max-width: 580px;
    transform: scale(0.93) translateY(20px);
    transition: transform 0.38s cubic-bezier(0.22,1,0.36,1);
    box-shadow: 0 40px 100px rgba(30,18,14,0.3);
    position: relative;
  }

  .overlay.open .modal { transform: scale(1) translateY(0); }

  /* Colored top bar instead of photo */
  .modal-top {
    height: 8px;
    background: linear-gradient(90deg, var(--blush), var(--rose), var(--peach), var(--champagne));
    border-radius: 20px 20px 0 0;
  }

  .modal-body {
    padding: 2.2rem 2.5rem 2.2rem;
    text-align: center;
  }

  .modal-pts-badge {
    display: inline-block;
    font-family: 'Playfair Display', serif;
    font-size: 2.6rem;
    font-weight: 700;
    color: var(--rose-deep);
    line-height: 1;
    margin-bottom: 0.35rem;
  }

  .modal-cat-label {
    font-size: 0.56rem;
    font-weight: 500;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--rose);
    margin-bottom: 1.4rem;
    display: block;
  }

  .modal-question {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.2rem, 3vw, 1.6rem);
    font-weight: 400;
    font-style: italic;
    color: var(--text);
    line-height: 1.55;
    margin-bottom: 1.8rem;
  }

  .modal-question .q-main {
    display: block;
    text-align: center;
    margin-bottom: 0.9rem;
  }

  .modal-question .q-options {
    display: inline-block;
    text-align: left;
    margin: 0 auto;
  }

  .modal-question .q-option {
    display: block;
    line-height: 1.7;
  }

  .modal-btns {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
  }

  .mbtn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.82rem 1.9rem;
    border-radius: 40px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1.6;
  }

  .mbtn-fill {
    background: var(--rose-deep);
    color: white;
    box-shadow: 0 4px 18px rgba(184,100,120,0.28);
  }

  .mbtn-fill:hover { background: var(--rose); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(184,100,120,0.38); }

  .mbtn-outline {
    background: transparent;
    border: 1px solid var(--sand);
    color: var(--text-soft);
  }

  .mbtn-outline:hover { border-color: var(--warm); background: var(--peach-soft); }

  /* ── CONFETTI ── */
  .spark {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    animation: sparkDrop linear forwards;
    border-radius: 50%;
  }

  @keyframes sparkDrop {
    0%   { transform: translateY(0) rotate(0deg); opacity:1; }
    100% { transform: translateY(105vh) rotate(540deg); opacity:0; }
  }

  footer {
    position: relative;
    z-index: 1;
    border-top: 1px solid var(--sand);
    padding: 1.5rem 1rem 3rem;
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--text-soft);
    opacity: 0.55;
  }


  /* ── TIMER BAR ── */
  .timer-bar-wrap {
    height: 14px;
    background: var(--sand);
    border-radius: 0 0 20px 20px;
    overflow: hidden;
    position: relative;
  }
  .timer-bar {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, var(--rose-deep), var(--rose), var(--peach));
    transform-origin: left;
    transition: none;
  }
  .timer-bar.running {
    transition: width linear;
  }
  .timer-bar.urgent {
    background: linear-gradient(90deg, #c0392b, #e74c3c);
    animation: urgentPulse 0.5s ease-in-out infinite alternate;
  }
  @keyframes urgentPulse {
    from { opacity: 1; }
    to   { opacity: 0.6; }
  }
  .timer-countdown {
    position: absolute;
    bottom: 18px;
    left: 14px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--white);
    border: 2px solid var(--sand);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-soft);
    z-index: 10;
    transition: color 0.3s, border-color 0.3s, font-weight 0.3s;
    pointer-events: none;
  }
  .timer-countdown.urgent {
    color: #c0392b;
    border-color: #e74c3c;
    font-weight: 700;
  }

  /* ── TIME'S UP OVERLAY ── */
  .timesup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(30,18,14,0.85);
    backdrop-filter: blur(16px) saturate(0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    padding: 1.5rem;
  }
  .timesup-overlay.open {
    opacity: 1;
    pointer-events: all;
  }
  .timesup-modal {
    background: var(--dark);
    border: 1px solid rgba(201,169,110,0.25);
    border-radius: 20px;
    width: 100%;
    max-width: 560px;
    overflow: hidden;
    transform: scale(0.9) translateY(24px);
    transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
    box-shadow: 0 40px 100px rgba(0,0,0,0.5);
  }
  .timesup-overlay.open .timesup-modal {
    transform: scale(1) translateY(0);
  }
  .timesup-top {
    height: 5px;
    background: linear-gradient(90deg, #c0392b, #e74c3c, var(--rose), var(--champagne));
  }
  .timesup-body {
    padding: 2.5rem 2.5rem 2.2rem;
    text-align: center;
  }
  .timesup-emoji {
    font-size: 2.8rem;
    margin-bottom: 0.6rem;
    animation: shake 0.5s ease both;
  }
  @keyframes shake {
    0%,100% { transform: rotate(0deg); }
    20%      { transform: rotate(-12deg); }
    40%      { transform: rotate(12deg); }
    60%      { transform: rotate(-8deg); }
    80%      { transform: rotate(8deg); }
  }
  .timesup-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(2.2rem, 7vw, 3.8rem);
    letter-spacing: 0.04em;
    background: linear-gradient(135deg, #f5dda8, #c9a96e, #f0e0b0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.4rem;
  }
  .timesup-divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0.8rem auto;
  }
  .timesup-sub {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.3rem, 3vw, 1.7rem);
    font-weight: 600;
    color: var(--rose);
    margin-bottom: 1.4rem;
  }
  .timesup-q {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(0.95rem, 2.2vw, 1.2rem);
    color: rgba(232,212,168,0.75);
    line-height: 1.6;
    background: rgba(255,252,249,0.05);
    border: 1px solid rgba(201,169,110,0.18);
    border-radius: 10px;
    padding: 1rem 1.3rem;
  }


    .board { gap: 6px; }
    .card { height: 72px; }
    .modal-body { padding: 1.8rem 1.4rem 1.8rem; }
    .hero { height: 240px; }
    .cutout { display: none; }
  }
</style>
</head>
<body>

<!-- SCOREBOARD -->
<div class="scoreboard">
  <div class="team-panel">
    <div class="team-tag">Team 1</div>
    <div class="team-score" id="s1">0</div>
    <div class="pts-wrap" id="pb1"></div>
    <span class="reset-txt" onclick="resetScore(1)">Reset</span>
  </div>
  <div class="vs-sep">—</div>
  <div class="team-panel">
    <div class="team-tag">Team 2</div>
    <div class="team-score" id="s2">0</div>
    <div class="pts-wrap" id="pb2"></div>
    <span class="reset-txt" onclick="resetScore(2)">Reset</span>
  </div>
</div>

<!-- BOARD -->
<main class="board-wrap">
  <div class="board-label">Choose a category &amp; point value</div>
  <div class="board" id="board"></div>
</main>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-top"></div>
    <div class="modal-body">
      <div class="modal-pts-badge" id="mBadge">$200</div>
      <span class="modal-cat-label" id="mCat"></span>
      <div class="modal-question" id="mQ"></div>
      <div class="modal-btns">
        <button class="mbtn mbtn-fill" id="startTimerBtn" onclick="beginTimer()">Start Timer</button>
        <button class="mbtn mbtn-outline" onclick="closeModal()">Close</button>
      </div>
    </div>
    <div class="timer-bar-wrap">
      <div class="timer-bar" id="timerBar"></div>
    </div>
    <div class="timer-countdown" id="timerCountdown">60</div>
  </div>
</div>

<!-- TIME'S UP OVERLAY -->
<div class="timesup-overlay" id="timesupOverlay">
  <div class="timesup-modal">
    <div class="timesup-top"></div>
    <div class="timesup-body">
      <div class="timesup-emoji">⏰</div>
      <h2 class="timesup-title">Time's Up!</h2>
      <div class="timesup-divider"></div>
      <p class="timesup-sub">Answer check time!</p>
      <div class="timesup-q" id="timesupQ"></div>
      <div class="modal-btns" style="margin-top:1.8rem;">
        <button class="mbtn mbtn-fill" onclick="closeTimesUp()">Close</button>
      </div>
    </div>
  </div>
</div>

<div style="position:relative;z-index:1;text-align:center;padding:1.5rem 1rem 0.5rem;"><button id="finalJeopardyBtn" style="font-family:'DM Sans',sans-serif;font-size:0.65rem;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;padding:1rem 2.8rem;border-radius:40px;border:none;cursor:pointer;background:linear-gradient(135deg,#b86478,#d98fa0);color:white;box-shadow:0 4px 22px rgba(184,100,120,0.35);transition:all 0.22s;" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 8px 28px rgba(184,100,120,0.5)'" onmouseout="this.style.transform='';this.style.boxShadow='0 4px 22px rgba(184,100,120,0.35)'" onclick="goToFinal()">✦ &nbsp; Final Jeopardy &nbsp; ✦</button></div><footer>Cheers to Francesca &amp; Dom &mdash; forever starts here</footer>

<script>
const CATS = [
  {
    name: "Franny Knows Best",
    qs: [
      { q: "Is Franny more likely to dance or sing at a party?" },
      { q: "What is Franny's favorite bar at the beach? (Seacrets, Fagers, Starboard, Bottle & Cork, Rusty Rudder)" },
      { q: "What event/activity is Franny most excited for on this trip?" },
      { q: "What is Franny's biggest fear?" },
      { q: "What did Franny decide her first child's name is going to be?" },
    ]
  },
  {
    name: "Dommy Mommy",
    qs: [
      { q: "What is Dom's favorite beer?" },
      { q: "According to Dom, Franny's skincare routine takes: A) 5 minutes B) 10 minutes C) 20 minutes D) 45 minutes" },
      { q: "According to Dom, Franny will fall asleep/pass out on her wedding night at: A) Midnight B) 2AM C) 4AM D) All nighter baby" },
      { q: "What is Dom's favorite US Military aircraft? A) F-22 Raptor B) B-2 Stealth Bomber C) A-10 Warthog D) RQ-4 Global Hawk" },
      { q: "According to Dom, what is his favorite experience he shared with Franny?" },
    ]
  },
  {
    name: "Hot & Married ;)",
    qs: [
      { q: "Who made the first move?" },
      { q: "According to Franny, who is more likely to send a cheeky text first ;)" },
      { q: "According to Franny, what is Bruno most likely doing when Fran & Dom are gettin' it on?" },
      { q: "How long would Franny say her and Dom's \"honeymoon phase\" was?" },
      { q: "According to Franny, what is the craziest (or funniest) place her and Dom have done the deed?" },
    ]
  },
  {
    name: "The Wild Card",
    qs: [
      { q: "What kind of dog is Bruno?" },
      { q: "How many boyfriends has Franny had?" },
      { q: "This is the couple's go-to takeout order when they can't agree on dinner" },
      { q: "What position did Dom & Franny play in Lacrosse? (must get both correct!)" },
      { q: "This is the show the couple has rewatched more times than they'd like to admit" },
    ]
  },
  {
    name: "The Venanzi Files",
    qs: [
      { q: "Where did Franny meet Dom?" },
      { q: "How many years have Franny and Dom been dating?" },
      { q: "What is Franny & Dom's first dance song?" },
      { q: "What is Franny & Dom's most used emoji in texts?" },
      { q: "Where and on what date did Dom propose?" },
    ]
  },
  {
    name: "Dommy Mommy 2",
    qs: [
      { q: "According to Dom, who will be more nervous at the altar? A) Franny B) Dom C) Equal!!" },
      { q: "On a scale of 1–10, how would Dom rate Franny's parallel parking ability? A) 1–2 B) 3–5 C) 6–7 D) 8–10" },
      { q: "According to Dom, what is Franny's signature move on the dance floor? A) Twerking B) Can opener C) Juju on that beat D) Stanky leg" },
      { q: "According to Dom, what is his favorite dish that Franny makes? A) Chili B) Spaghetti with peppers & Italian sausage C) Tortellini soup D) Salmon" },
      { q: "According to Dom, the reality TV show he could most see Franny on is..." },
    ]
  }
];

const PTS = [200, 400, 600, 800, 1000];
let scores = [0, 0];
let current = null;

function buildScoreBtns() {
  [0,1].forEach(i => {
    const wrap = document.getElementById('pb' + (i+1));
    PTS.forEach(v => {
      const b = document.createElement('button');
      b.className = 'pt-btn';
      b.textContent = '+' + v;
      b.onclick = () => addPts(i, v);
      wrap.appendChild(b);
    });
    const s = document.createElement('button');
    s.className = 'pt-btn sub';
    s.textContent = '− pts';
    s.onclick = () => {
      const n = parseInt(prompt('Deduct how many points?', '200') || '0');
      if (!isNaN(n) && n > 0) addPts(i, -n);
    };
    wrap.appendChild(s);
  });
}

function addPts(i, v) {
  scores[i] = Math.max(0, scores[i] + v);
  document.getElementById('s' + (i+1)).textContent = scores[i].toLocaleString();
  if (v > 0) popConfetti();
}

function resetScore(t) {
  if (confirm('Reset Team ' + t + ' score to zero?')) {
    scores[t-1] = 0;
    document.getElementById('s' + t).textContent = '0';
  }
}

function buildBoard() {
  const board = document.getElementById('board');
  CATS.forEach(cat => {
    const h = document.createElement('div');
    h.className = 'cat-head';
    h.innerHTML = '<span class="cat-head-name">' + cat.name + '</span>';
    board.appendChild(h);
  });
  PTS.forEach((pts, row) => {
    CATS.forEach((cat, col) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.id = 'c' + col + '_' + row;
      card.innerHTML = '<span class="card-val">$' + pts + '</span>';
      card.onclick = () => openModal(col, row, pts, cat);
      board.appendChild(card);
    });
  });
}

let timerInterval = null;
let timerTimeout = null;

let pendingQuestion = null;

function openModal(col, row, pts, cat) {
  current = {col, row};
  document.getElementById('mBadge').textContent = '$' + pts;
  document.getElementById('mCat').textContent = cat.name;
  const raw = cat.qs[row].q;
  pendingQuestion = raw;
  const parts = raw.split(/(?= [A-D]\))/);
  const qEl = document.getElementById('mQ');
  qEl.innerHTML = '';

  const mainSpan = document.createElement('span');
  mainSpan.className = 'q-main';
  mainSpan.textContent = parts[0].trim();
  qEl.appendChild(mainSpan);

  if (parts.length > 1) {
    const optWrap = document.createElement('span');
    optWrap.className = 'q-options';
    parts.slice(1).forEach(part => {
      const line = document.createElement('span');
      line.className = 'q-option';
      line.textContent = part.trim();
      optWrap.appendChild(line);
    });
    qEl.appendChild(optWrap);
  }

  // Reset timer bar to idle state
  timerPaused = false;
  timerStartedAt = null;
  timerSecsLeft = 90;
  const bar = document.getElementById('timerBar');
  const countdown = document.getElementById('timerCountdown');
  bar.style.transition = 'none';
  bar.style.width = '100%';
  bar.classList.remove('running', 'urgent');
  countdown.textContent = '90';
  countdown.classList.remove('urgent');

  const btn = document.getElementById('startTimerBtn');
  btn.disabled = false;
  btn.textContent = 'Start Timer';
  btn.style.opacity = '1';
  btn.style.background = '';
  btn.style.border = '';
  btn.style.color = '';
  btn.className = 'mbtn mbtn-fill';

  document.getElementById('overlay').classList.add('open');
}

let timerPaused = false;
let timerSecsLeft = 90;
let timerStartedAt = null;
let timerBarWidthAtPause = 100;

function beginTimer() {
  if (!pendingQuestion) return;
  const btn = document.getElementById('startTimerBtn');
  const runningLabel = 'Timer Running<br><span style="font-size:0.45rem;opacity:0.65;letter-spacing:0.15em;font-weight:400;">click to pause</span>';

  if (!timerStartedAt && !timerPaused) {
    // First start
    timerPaused = false;
    btn.disabled = false;
    btn.innerHTML = runningLabel;
    btn.style.opacity = '1';
    btn.style.background = 'transparent';
    btn.style.border = '1px solid var(--sand)';
    btn.style.color = 'var(--text-soft)';
    startTimer(pendingQuestion);
  } else if (!timerPaused) {
    // Pause
    timerPaused = true;
    pauseTimer();
    btn.textContent = 'Resume Timer';
    btn.style.background = '';
    btn.style.border = '';
    btn.style.color = '';
    btn.className = 'mbtn mbtn-fill';
  } else {
    // Resume
    timerPaused = false;
    btn.innerHTML = runningLabel;
    btn.style.background = 'transparent';
    btn.style.border = '1px solid var(--sand)';
    btn.style.color = 'var(--text-soft)';
    resumeTimer(pendingQuestion);
  }
}

function pauseTimer() {
  clearTimeout(timerTimeout);
  clearInterval(timerInterval);
  const bar = document.getElementById('timerBar');
  // Freeze bar visually
  const computedWidth = bar.getBoundingClientRect().width;
  const wrapWidth = bar.parentElement.getBoundingClientRect().width;
  timerBarWidthAtPause = wrapWidth > 0 ? (computedWidth / wrapWidth) * 100 : timerBarWidthAtPause;
  bar.style.transition = 'none';
  bar.style.width = timerBarWidthAtPause + '%';
  bar.classList.remove('running');
}

function resumeTimer(questionText) {
  const bar = document.getElementById('timerBar');
  const countdown = document.getElementById('timerCountdown');
  const remaining = timerSecsLeft * 1000;
  const URGENT_SECS = 15;

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      bar.classList.add('running');
      bar.style.transition = 'width ' + remaining + 'ms linear';
      bar.style.width = '0%';
    });
  });

  timerInterval = setInterval(() => {
    timerSecsLeft--;
    countdown.textContent = timerSecsLeft;
    if (timerSecsLeft <= URGENT_SECS) {
      countdown.classList.add('urgent');
      bar.classList.add('urgent');
    }
    if (timerSecsLeft <= 0) clearInterval(timerInterval);
  }, 1000);

  timerTimeout = setTimeout(() => {
    clearTimer();
    fireTimesUp(questionText);
  }, remaining);
}

function startTimer(questionText) {
  clearTimer();
  timerPaused = false;
  timerSecsLeft = 90;
  timerStartedAt = Date.now();
  const bar = document.getElementById('timerBar');
  const countdown = document.getElementById('timerCountdown');
  const DURATION = 90000;
  const URGENT_SECS = 15;

  bar.style.transition = 'none';
  bar.style.width = '100%';
  bar.classList.remove('running', 'urgent');
  countdown.textContent = '90';
  countdown.classList.remove('urgent');

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      bar.classList.add('running');
      bar.style.transition = 'width ' + DURATION + 'ms linear';
      bar.style.width = '0%';
    });
  });

  timerInterval = setInterval(() => {
    timerSecsLeft--;
    countdown.textContent = timerSecsLeft;
    if (timerSecsLeft <= URGENT_SECS) {
      countdown.classList.add('urgent');
      bar.classList.add('urgent');
    }
    if (timerSecsLeft <= 0) clearInterval(timerInterval);
  }, 1000);

  timerTimeout = setTimeout(() => {
    clearTimer();
    fireTimesUp(questionText);
  }, DURATION);
}

function clearTimer() {
  clearTimeout(timerTimeout);
  clearInterval(timerInterval);
  timerPaused = false;
  timerStartedAt = null;
  timerSecsLeft = 90;
  const bar = document.getElementById('timerBar');
  const countdown = document.getElementById('timerCountdown');
  bar.style.transition = 'none';
  bar.style.width = '100%';
  bar.classList.remove('running', 'urgent');
  if (countdown) { countdown.textContent = '90'; countdown.classList.remove('urgent'); }
}

function fireTimesUp(questionText) {
  document.getElementById('overlay').classList.remove('open');
  if (current) {
    const el = document.getElementById('c' + current.col + '_' + current.row);
    if (el) el.classList.add('used');
    current = null;
  }
  const tq = document.getElementById('timesupQ');
  tq.innerHTML = '';
  const tparts = questionText.split(/(?= [A-D]\))/);
  const tmain = document.createElement('div');
  tmain.textContent = tparts[0].trim();
  tmain.style.marginBottom = tparts.length > 1 ? '0.6rem' : '0';
  tq.appendChild(tmain);
  if (tparts.length > 1) {
    const optWrap = document.createElement('div');
    optWrap.style.cssText = 'display:inline-block;text-align:left;';
    tparts.slice(1).forEach(part => {
      const line = document.createElement('div');
      line.textContent = part.trim();
      optWrap.appendChild(line);
    });
    tq.appendChild(optWrap);
  }
  document.getElementById('timesupOverlay').classList.add('open');
}

function closeTimesUp() {
  document.getElementById('timesupOverlay').classList.remove('open');
}

function closeModal() {
  clearTimer();
  document.getElementById('overlay').classList.remove('open');
  if (current) {
    const el = document.getElementById('c' + current.col + '_' + current.row);
    if (el) el.classList.add('used');
    current = null;
  }
}

function overlayClick(e) {
  if (e.target.id === 'overlay') closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function popConfetti() {
  const palette = ['#f2c4c4','#e8d4a8','#d98fa0','#c9a96e','#f5cdb4','#b86478','#e8ddd0','#f5dda8'];
  for (let i = 0; i < 30; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'spark';
      const sz = 5 + Math.random() * 7;
      p.style.cssText =
        'left:' + (Math.random()*100) + 'vw;' +
        'top:-12px;' +
        'width:' + sz + 'px;' +
        'height:' + sz + 'px;' +
        'background:' + palette[Math.floor(Math.random()*palette.length)] + ';' +
        'border-radius:' + (Math.random()>0.4?'50%':'3px') + ';' +
        'animation-duration:' + (2+Math.random()*2.5) + 's;';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 5000);
    }, i * 50);
  }
}

buildScoreBtns();
buildBoard();

function goToFinal() {
  const s1 = scores[0] || 0;
  const s2 = scores[1] || 0;
  window.location.href = 'final-jeopardy.html?s1=' + s1 + '&s2=' + s2;
}

</script>
</body>
</html>
